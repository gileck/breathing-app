<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5EEAD4;stop-opacity:1" />
      <stop offset="45%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.28);stop-opacity:1" />
      <stop offset="45%" style="stop-color:rgba(255,255,255,0.04);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:1" />
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,1);stop-opacity:1" />
      <stop offset="60%" style="stop-color:rgba(255,255,255,0.95);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.75);stop-opacity:1" />
    </radialGradient>
    <radialGradient id="softGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.45);stop-opacity:1" />
      <stop offset="70%" style="stop-color:rgba(255,255,255,0.08);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:1" />
    </radialGradient>
  </defs>

  <!-- Background rounded square (iOS corner radius ~22% of size) -->
  <rect x="0" y="0" width="512" height="512" rx="113" ry="113" fill="url(#bgGradient)"/>

  <!-- Top highlight sheen -->
  <rect x="0" y="0" width="512" height="512" rx="113" ry="113" fill="url(#highlight)"/>

  <!-- Ambient center glow -->
  <circle cx="256" cy="256" r="210" fill="url(#softGlow)"/>

  <!-- Breath rings (expanding outward) -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="3"/>
  <circle cx="256" cy="256" r="155" fill="none" stroke="rgba(255,255,255,0.34)" stroke-width="4"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="rgba(255,255,255,0.55)" stroke-width="5"/>
  <circle cx="256" cy="256" r="86" fill="none" stroke="rgba(255,255,255,0.78)" stroke-width="6"/>

  <!-- Luminous core orb -->
  <circle cx="256" cy="256" r="52" fill="url(#coreGlow)"/>
</svg>
